name: "MyST Accessibility Checks"
description: 'Run axe-core accessibility checks on MyST site.'

branding:
  icon: 'check-square'
  color: 'blue'

inputs:
  run_build:
    description: 'Should this action run the MyST build process?'
    required: false
    default: 'true'
  build_directory:
    description: 'Path to the built HTML directory (if run_build is false)'
    required: false
    default: '_build/html'
  working_directory:
    description: 'Relative path to the MyST project root (if run_build is true)'
    required: false
    default: '.'
  base_url:  
    description: 'MyST site base URL'
    required: false
    default: ''
  tags:
    description: 'Comma-separated list of axe-core tags to run (e.g., wcag2a,wcag2aa)'
    required: false
    default: 'wcag2a,wcag2aa,wcag21a,wcag21aa'
  save_report:
    description: 'Whether to save the axe report as an artifact'
    required: false
    default: 'true'
  exclude:
    description: 'CSS selectors to exclude from the check (comma-separated)'
    required: false
    default: ''
  execute:
    description: 'Whether to include the --execute flag for myst build'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22.x

    - name: Set up Python
      if: ${{ inputs.run_build == 'true' && inputs.execute == 'true' }}
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      if: ${{ inputs.run_build == 'true' }}
      shell: bash
      run: |
        # Global tools needed for the action logic
        npm install -g mystmd @axe-core/cli http-server wait-on
        npx browser-driver-manager install chrome
        
        # Handle dependencies being aware of environment
        if [ "${{ inputs.working_directory }}" != "." ] && [ -f "package.json" ]; then
          echo "Detected root package.json. Installing from root to support workspaces..."
          # Install from root to ensure monorepo binaries are available
          npm install
        fi

        # If execution is requested, ensure Python and Jupyter are available
        if [ "${{ inputs.execute }}" == "true" ]; then
          pip install jupyterlab ipykernel
          python -m ipykernel install --user --name python3
          if [ -f "requirements.txt" ]; then
            echo "Detected requirements.txt at repo root. Installing..."
            pip install -r requirements.txt
          fi
        fi

        cd ${{ inputs.working_directory }}

        if [ "${{ inputs.execute }}" == "true" ] && [ -f "requirements.txt" ]; then
          echo "Detected requirements.txt in ${{ inputs.working_directory }}. Installing..."
          pip install -r requirements.txt
        fi
        
        if [ -f "package.json" ]; then
          echo "Detected package.json in ${{ inputs.working_directory }}. Installing..."
          npm install --prefer-offline
        fi

    - name: Build and Run Axe
      if: ${{ inputs.run_build == 'true' }}
      shell: bash
      run: |
        cd ${{ inputs.working_directory }}
        
        # Ensure the build uses local node_modules if they exist
        export PATH="$PATH:$(pwd)/node_modules/.bin:$(cd .. && pwd)/node_modules/.bin"
        
        # Run the build
        if [ "${{ inputs.execute }}" == "true" ]; then
          myst build --html --execute
        else
          myst build --html
        fi

        mkdir -p staging${{ inputs.base_url }}
        cp -r _build/html/* staging${{ inputs.base_url }}/
        
        npx http-server staging -p 8080 -s &
        npx wait-on http://localhost:8080${{ inputs.base_url }}/
        
        cd _build/html
        URLS=$(find . -name "*.html" -not -path "*/build/*" | sed 's|^\./||' | sed "s|^|http://localhost:8080${{ inputs.base_url }}/|" | tr '\n' ' ')
        
        # Define the base command as an array
        AXE_ARGS=("--tags" "${{ inputs.tags }}" "--save" "axe-report.json" "--exit")

        # Add the exclude if it exists
        if [ -n "${{ inputs.exclude }}" ]; then
          AXE_ARGS+=("--exclude" "${{ inputs.exclude }}")
        fi

        # Execute without eval
        npx axe $URLS "${AXE_ARGS[@]}"

    - name: No Build, Run Axe
      if: ${{ inputs.run_build == 'false' }}
      shell: bash
      run: |
        mkdir -p staging${{ inputs.base_url }}
        cp -r ${{ inputs.build_directory }}/* staging${{ inputs.base_url }}/
        
        npx http-server staging -p 8080 -s &
        npx wait-on http://localhost:8080${{ inputs.base_url }}/
        
        cd ${{ inputs.build_directory }}
        URLS=$(find . -name "*.html" -not -path "*/build/*" | sed 's|^\./||' | sed "s|^|http://localhost:8080${{ inputs.base_url }}/|" | tr '\n' ' ')
        
        # Define the base command as an array
        AXE_ARGS=("--tags" "${{ inputs.tags }}" "--save" "axe-report.json" "--exit")

        # Add the exclude if it exists
        if [ -n "${{ inputs.exclude }}" ]; then
          AXE_ARGS+=("--exclude" "${{ inputs.exclude }}")
        fi

        # Execute without eval
        npx axe $URLS "${AXE_ARGS[@]}"

    - name: Upload Accessibility Report
      if: ${{ always() && inputs.save_report == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: axe-report
        path: |
          **/axe-report.json
